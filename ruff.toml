target-version = "py311"
line-length = 100
indent-width = 4

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "S",
    "N",
    "RUF",
    "PT",
    "SIM",
    "G",
]

ignore = [
    "S101",
    "S603",
    "S608",
    "SIM108",
    "RUF012",
]

fixable = ["ALL"]
unfixable = []

exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "*.egg-info",
    "dist",
    "build",
    "logs",
]

[lint.per-file-ignores]
"app/fetcher.py" = ["S310"]
"tests/**" = ["S101", "S105", "SIM117", "N802"]

[lint.isort]
known-first-party = ["app"]
force-sort-within-sections = true

[lint.pep8-naming]
classmethod-decorators = ["classmethod"]

[lint.flake8-bugbear]
extend-immutable-calls = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = false